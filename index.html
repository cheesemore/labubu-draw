<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠悠专属抽卡页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-wrapper {
            perspective: 1000px;
            margin-bottom: 2rem;
            min-height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: all 0.5s ease;
        }
        /* 笑话容器 */
        .joke-container {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            text-align: left;
        }
        .card-wrapper.show-joke .joke-container {
            width: auto;
            opacity: 1;
        }
        .card {
            width: 300px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* 手机端微信适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
            }
            .card-wrapper {
                height: 380px;
            }
            .card {
                width: 240px;
                height: 336px;
            }
        }
        .card.drawing {
            animation: shake 0.5s ease-in-out 3;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-front {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .draw-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .draw-btn:active {
            transform: translateY(0);
        }
        .draw-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .preview-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .preview-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .preview-btn:active {
            transform: translateY(0);
        }
        .hint {
            color: rgba(255,255,255,0.8);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        /* 预览弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            overflow-y: auto;
            padding: 20px;
        }
        .modal.show {
            display: block;
        }
        .modal-content {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .modal-header h2 {
            color: #333;
            font-size: 1.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        .close-btn:hover {
            color: #333;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }
        .card-item {
            text-align: center;
        }
        .card-item img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }
        .card-item p {
            font-size: 0.9rem;
            color: #333;
            font-weight: bold;
        }
        /* 手机端按钮适配 */
        @media (max-width: 768px) {
            .card-wrapper {
                min-height: auto;
                flex-direction: column;
                gap: 1rem;
            }
            .card {
                width: 240px;
                height: 336px;
            }
            .joke-container {
                max-width: 100%;
                width: 100%;
                margin-bottom: 1rem;
            }
            .draw-btn, .preview-btn {
                padding: 12px 25px;
                font-size: 1rem;
                margin: 5px;
            }
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
        /* 版本号，右下角淡淡显示 */
        .version {
            position: fixed;
            right: 15px;
            bottom: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 悠悠小朋友专属抽卡页面</h1>
        <div class="card-wrapper" id="cardWrapper">
            <div class="card" id="card">
                <div class="card-face card-front">
                    ?
                </div>
                <div class="card-face card-back" id="cardBack">
                    <img id="cardImg" src="" alt="抽到的卡片">
                </div>
            </div>
            <div class="joke-container" id="jokeContainer">
                <span id="jokeText"></span>
            </div>
        </div>
        <div style="margin-bottom: 1rem;">
            <button class="draw-btn" id="drawBtn">抽 一 次</button>
            <button class="preview-btn" id="previewBtn">📖 卡牌预览</button>
        </div>
        <p class="hint">2张相同的1分或2分卡可以兑换一次抽奖次数</p>
        <div class="version">V1.0.3</div>

        <!-- 卡牌预览弹窗 -->
        <div class="modal" id="previewModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎴 全部卡牌预览</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="cards-grid" id="cardsGrid">
                </div>
            </div>
        </div>
    </div>
    <script>

        const drawBtn = document.getElementById('drawBtn');
        const cardImg = document.getElementById('cardImg');
        let isDrawing = false;
        let hasDrawn = false;
        let lastDrawnCard = null; // 记录上一次抽到的卡，避免连续重复
        let lastJokeIndex = null; // 记录上一次显示的笑话，避免连续重复
        // Labubu小笑话库，适合小朋友看

            "什么东西每天早上叫你起床，到点就响，你不想起都不行？是闹钟呀！Labubu的小闹钟每天早上七点都会准时叫他起床，从来都不会晚~",
            "Labubu去买草莓，老板说草莓特别甜，不甜不要钱，Labubu说：那你给我来两斤不甜的，我妈妈最近咳嗽，不能吃甜的~",
            "老师问：如果教室着火了你会怎么做？Labubu说：我会先把我的零食和玩具带上，再跑出去，不然烧没了我就没有零食吃了~",
            "有一天小鸭子去海边游泳，游完上岸晒了会太阳，结果变成了烤鸭，Labubu听完笑的直打滚，说小鸭子也太可怜了~",
            "妈妈问Labubu长大了会不会孝顺妈妈？Labubu说当然会呀，我长大了要给妈妈买好多好吃的，买漂亮衣服，带妈妈去全世界旅游~",
            "为什么面包和面条吵架，旁边的馒头说你们别吵了我最好吃？Labubu走过来说你们都好吃，我不挑食，吃什么都香~",

            "为什么Labubu每次吃饭之前都要认真洗手？因为老师说饭前便后要洗手，不然手上的细菌会吃到肚子里，会生病的~"

        // 优化后的随机抽卡，避免连续抽到相同的卡
        function drawCard() {
            const totalWeight = cards.reduce((sum, card) => sum + card.weight, 0);
            let resultCard;
            // 最多循环10次，避免极端情况死循环，正常最多2-3次就会抽到不同的卡
            for (let i = 0; i < 10; i++) {
                // 用「当前时间戳+随机数」生成更均匀的随机种子，避免连续调用时随机数过于接近
                const seed = Date.now() + Math.random() * 1000000;
                let random = (seed % 1000000) / 1000000 * totalWeight;
                for (const card of cards) {
                    random -= card.weight;
                    if (random <= 0) {
                        resultCard = card;
                        break;
                    }
                }
                // 如果和上一次结果不同，或者是第一次抽卡，直接返回
                if (lastDrawnCard === null || resultCard.value !== lastDrawnCard.value) {
                    break;
                }
            }
            // 记录本次结果，下次抽卡对比用
            lastDrawnCard = resultCard;
            return resultCard;
        }
        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;
            if (hasDrawn) {
                // 立刻清空上一次的卡片图片，避免翻转动画过程中显示旧卡
                cardImg.src = '';
                cardImg.alt = '';
                // 隐藏笑话区域，等动画结束再重置卡片
                document.getElementById('cardWrapper').classList.remove('show-joke');
                setTimeout(() => {
                    // 重置状态
                    cardEl.classList.remove('flipped');
                    drawBtn.textContent = '抽 一 次';
                    hasDrawn = false;
                }, 500); // 和笑话动画时长一致
                return;
            }
            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.textContent = '抽卡中...';
            // 开始抖动动画
            cardEl.classList.add('drawing');
            setTimeout(() => {
                // 抖动结束，开始翻转
                cardEl.classList.remove('drawing');
                // 先翻到背面
                cardEl.classList.add('flipped');
                // 翻转到一半的时候设置图片和笑话
                setTimeout(() => {
                    const result = drawCard();
                    cardImg.src = result.img;
                    cardImg.alt = `${result.value}分${result.name}卡`;
                    
                    // 随机拿一个不重复的笑话
                    let jokeIndex;
                    do {
                        jokeIndex = Math.floor(Math.random() * jokes.length);
                    } while (jokeIndex === lastJokeIndex && jokes.length > 1);
                    lastJokeIndex = jokeIndex;
                    document.getElementById('jokeText').textContent = jokes[jokeIndex];
                }, 400);
                // 动画结束，显示笑话，恢复按钮
                setTimeout(() => {
                    // 显示笑话区域
                    document.getElementById('cardWrapper').classList.add('show-joke');
                    isDrawing = false;
                    drawBtn.disabled = false;
                    drawBtn.textContent = '再抽一次';
                    hasDrawn = true;
                }, 800);
            }, 1500); // 抖动1.5秒
        });

        // 卡牌预览功能
        const previewBtn = document.getElementById('previewBtn');
        const previewModal = document.getElementById('previewModal');
        const closeModal = document.getElementById('closeModal');
        const cardsGrid = document.getElementById('cardsGrid');

        // 生成预览卡片
        function renderPreviewCards() {
            cardsGrid.innerHTML = '';
            cards.forEach(card => {
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML = `
                    <img src="${card.img}" alt="${card.value}分${card.name}卡">
                    <p>${card.value}分 ${card.name}</p>
                `;
                cardsGrid.appendChild(item);
            });
        }
        // 打开弹窗
        previewBtn.addEventListener('click', () => {
            renderPreviewCards();
            previewModal.classList.add('show');
            document.body.style.overflow = 'hidden';
        });
        // 关闭弹窗
        closeModal.addEventListener('click', () => {
            previewModal.classList.remove('show');
            document.body.style.overflow = 'auto';
        });
        // 点击弹窗空白处关闭
        previewModal.addEventListener('click', (e) => {
            if (e.target === previewModal) {
                previewModal.classList.remove('show');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
