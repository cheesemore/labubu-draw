<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labubu 抽卡模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-wrapper {
            perspective: 1000px;
            margin-bottom: 2rem;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 300px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* 手机端微信适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
            }
            .card-wrapper {
                height: 380px;
            }
            .card {
                width: 240px;
                height: 336px;
            }
        }
        .card.drawing {
            animation: shake 0.5s ease-in-out 3;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-front {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .draw-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .draw-btn:active {
            transform: translateY(0);
        }
        .draw-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .hint {
            color: rgba(255,255,255,0.8);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Labubu 抽卡模拟器</h1>
        <div class="card-wrapper">
            <div class="card" id="card">
                <div class="card-face card-front">
                    ?
                </div>
                <div class="card-face card-back" id="cardBack">
                    <img id="cardImg" src="" alt="抽到的卡片">
                </div>
            </div>
        </div>
        <button class="draw-btn" id="drawBtn">抽 一 次</button>
        <p class="hint">稀有度越高，越难抽到哦~ 最高10分传奇卡，祝你好运！</p>
    </div>
    <script>
        // 卡片配置
        const cards = [
            { value: 1, name: '青铜', img: 'assets/img/card_1.jpg', weight: 20 },
            { value: 2, name: '白银', img: 'assets/img/card_2.jpg', weight: 20 },
            { value: 3, name: '黄金', img: 'assets/img/card_3.jpg', weight: 18 },
            { value: 4, name: '铂金', img: 'assets/img/card_4.jpg', weight: 15 },
            { value: 5, name: '钻石', img: 'assets/img/card_5.jpg', weight: 12 },
            { value: 6, name: '至尊', img: 'assets/img/card_6.jpg', weight: 8 },
            { value: 8, name: '王者', img: 'assets/img/card_8.jpg', weight: 5 },
            { value: 10, name: '传奇', img: 'assets/img/card_10.jpg', weight: 2 }
        ];
        const cardEl = document.getElementById('card');
        const drawBtn = document.getElementById('drawBtn');
        const cardImg = document.getElementById('cardImg');
        let isDrawing = false;
        let hasDrawn = false;
        // 加权随机抽卡
        function drawCard() {
            const totalWeight = cards.reduce((sum, card) => sum + card.weight, 0);
            let random = Math.random() * totalWeight;
            for (const card of cards) {
                random -= card.weight;
                if (random <= 0) {
                    return card;
                }
            }
            return cards[0];
        }
        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;
            if (hasDrawn) {
                // 重置状态
                cardEl.classList.remove('flipped');
                drawBtn.textContent = '抽 一 次';
                hasDrawn = false;
                return;
            }
            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.textContent = '抽卡中...';
            // 开始抖动动画
            cardEl.classList.add('drawing');
            setTimeout(() => {
                // 抖动结束，开始翻转
                cardEl.classList.remove('drawing');
                // 先翻到背面
                cardEl.classList.add('flipped');
                // 翻转到一半的时候设置图片
                setTimeout(() => {
                    const result = drawCard();
                    cardImg.src = result.img;
                    cardImg.alt = `${result.value}分${result.name}卡`;
                }, 400);
                // 动画结束，恢复按钮
                setTimeout(() => {
                    isDrawing = false;
                    drawBtn.disabled = false;
                    drawBtn.textContent = '再抽一次';
                    hasDrawn = true;
                }, 800);
            }, 1500); // 抖动1.5秒
        });
    </script>
</body>
</html>
