<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labubu 抽卡模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-wrapper {
            perspective: 1000px;
            margin-bottom: 2rem;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 300px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* 手机端微信适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
            }
            .card-wrapper {
                height: 380px;
            }
            .card {
                width: 240px;
                height: 336px;
            }
        }
        .card.drawing {
            animation: shake 0.5s ease-in-out 3;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-front {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .draw-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .draw-btn:active {
            transform: translateY(0);
        }
        .draw-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .preview-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .preview-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .preview-btn:active {
            transform: translateY(0);
        }
        .hint {
            color: rgba(255,255,255,0.8);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        /* 预览弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            overflow-y: auto;
            padding: 20px;
        }
        .modal.show {
            display: block;
        }
        .modal-content {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .modal-header h2 {
            color: #333;
            font-size: 1.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        .close-btn:hover {
            color: #333;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }
        .card-item {
            text-align: center;
        }
        .card-item img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }
        .card-item p {
            font-size: 0.9rem;
            color: #333;
            font-weight: bold;
        }
        /* 手机端按钮适配 */
        @media (max-width: 768px) {
            .draw-btn, .preview-btn {
                padding: 12px 25px;
                font-size: 1rem;
                margin: 5px;
            }
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Labubu 抽卡模拟器</h1>
        <div class="card-wrapper">
            <div class="card" id="card">
                <div class="card-face card-front">
                    ?
                </div>
                <div class="card-face card-back" id="cardBack">
                    <img id="cardImg" src="" alt="抽到的卡片">
                </div>
            </div>
        </div>
        <div style="margin-bottom: 1rem;">
            <button class="draw-btn" id="drawBtn">抽 一 次</button>
            <button class="preview-btn" id="previewBtn">📖 卡牌预览</button>
        </div>
        <p class="hint">稀有度越高，越难抽到哦~ 最高10分传奇卡，祝你好运！</p>

        <!-- 卡牌预览弹窗 -->
        <div class="modal" id="previewModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎴 全部卡牌预览</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="cards-grid" id="cardsGrid">
                </div>
            </div>
        </div>
    </div>
    <script>
        // 卡片配置
        const cards = [
            { value: 1, name: '青铜', img: 'assets/img/card_1.jpg', weight: 20 },
            { value: 2, name: '白银', img: 'assets/img/card_2.jpg', weight: 20 },
            { value: 3, name: '黄金', img: 'assets/img/card_3.jpg', weight: 18 },
            { value: 4, name: '铂金', img: 'assets/img/card_4.jpg', weight: 15 },
            { value: 5, name: '钻石', img: 'assets/img/card_5.jpg', weight: 12 },
            { value: 6, name: '至尊', img: 'assets/img/card_6.jpg', weight: 8 },
            { value: 8, name: '王者', img: 'assets/img/card_8.jpg', weight: 5 },
            { value: 10, name: '传奇', img: 'assets/img/card_10.jpg', weight: 2 }
        ];
        const cardEl = document.getElementById('card');
        const drawBtn = document.getElementById('drawBtn');
        const cardImg = document.getElementById('cardImg');
        let isDrawing = false;
        let hasDrawn = false;
        // 加权随机抽卡
        function drawCard() {
            const totalWeight = cards.reduce((sum, card) => sum + card.weight, 0);
            let random = Math.random() * totalWeight;
            for (const card of cards) {
                random -= card.weight;
                if (random <= 0) {
                    return card;
                }
            }
            return cards[0];
        }
        drawBtn.addEventListener('click', () => {
            if (isDrawing) return;
            if (hasDrawn) {
                // 重置状态
                cardEl.classList.remove('flipped');
                drawBtn.textContent = '抽 一 次';
                hasDrawn = false;
                return;
            }
            isDrawing = true;
            drawBtn.disabled = true;
            drawBtn.textContent = '抽卡中...';
            // 开始抖动动画
            cardEl.classList.add('drawing');
            setTimeout(() => {
                // 抖动结束，开始翻转
                cardEl.classList.remove('drawing');
                // 先翻到背面
                cardEl.classList.add('flipped');
                // 翻转到一半的时候设置图片
                setTimeout(() => {
                    const result = drawCard();
                    cardImg.src = result.img;
                    cardImg.alt = `${result.value}分${result.name}卡`;
                }, 400);
                // 动画结束，恢复按钮
                setTimeout(() => {
                    isDrawing = false;
                    drawBtn.disabled = false;
                    drawBtn.textContent = '再抽一次';
                    hasDrawn = true;
                }, 800);
            }, 1500); // 抖动1.5秒
        });

        // 卡牌预览功能
        const previewBtn = document.getElementById('previewBtn');
        const previewModal = document.getElementById('previewModal');
        const closeModal = document.getElementById('closeModal');
        const cardsGrid = document.getElementById('cardsGrid');

        // 生成预览卡片
        function renderPreviewCards() {
            cardsGrid.innerHTML = '';
            cards.forEach(card => {
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML = `
                    <img src="${card.img}" alt="${card.value}分${card.name}卡">
                    <p>${card.value}分 ${card.name}</p>
                `;
                cardsGrid.appendChild(item);
            });
        }
        // 打开弹窗
        previewBtn.addEventListener('click', () => {
            renderPreviewCards();
            previewModal.classList.add('show');
            document.body.style.overflow = 'hidden';
        });
        // 关闭弹窗
        closeModal.addEventListener('click', () => {
            previewModal.classList.remove('show');
            document.body.style.overflow = 'auto';
        });
        // 点击弹窗空白处关闭
        previewModal.addEventListener('click', (e) => {
            if (e.target === previewModal) {
                previewModal.classList.remove('show');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
